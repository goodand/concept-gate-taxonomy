# Render 배포 설정.
#
# runtime: docker인 이유 — HermiT(OWL DL reasoner)가 Java를 요구하는데,
# 네이티브 python 런타임은 빌드 단계에 root가 없어 JRE를 설치할 수 없다.
# python 런타임으로 두면 배포 자체는 성공하지만 OWL 경로(classify_owl 등)가
# 전부 REASONER_UNAVAILABLE로 죽는다.
#
# 소스는 repo 루트의 conceptgate/ 패키지 하나뿐이다(배포 사본 없음).
# 빌드·기동 명령은 Dockerfile이 소유하므로 buildCommand/startCommand를 두지 않는다.
services:
  - type: web
    name: conceptgate-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8000"
      - key: MCP_API_TOKEN
        generateValue: true
      - key: MCP_TRANSPORT
        value: "http"
    healthCheckPath: /health
